# agent-pmo:b636503
name: Release

# [SWR-REL-WORKFLOW] Tag-triggered only. Builds the EXACT tagged SHA; the version is
# stamped in the runner working tree by scripts/stamp-version.mjs and never committed
# or pushed back ([SWR-VERSION-BUILD-STAMPING]). The website deploys automatically via
# deploy-pages.yml's workflow_run trigger when this workflow completes.
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# [SWR-SEC-TOKEN-PRIVILEGE] default-deny; write scopes are granted per job below.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: lint gate + dual npm publish + VSIX packaging exceeds 10 min on cold npm cache.
    timeout-minutes: 20
    environment: NPM Deployment
    permissions:
      contents: write # create the GitHub Release and upload assets
      id-token: write # npm --provenance and cosign keyless signing
      attestations: write # build-provenance attestations
    steps:
      # [SWR-VERSION-BUILD-STAMPING] No ref override — checkout resolves to the pushed tag's SHA.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Derive version from tag
        id: derive
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          NPM_TAG=latest
          if [[ "$VERSION" == *-* ]]; then NPM_TAG=beta; fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"

      # [SWR-VERSION-BUILD-STAMPING] First-class stamper — covered by
      # packages/cli/test/stamp-version.e2e.test.ts. Runner working tree only.
      - name: Stamp version in all carriers
        run: node scripts/stamp-version.mjs --version "${{ steps.derive.outputs.version }}"

      - run: npm install --package-lock-only

      # [SWR-SEC-FROZEN-INSTALL]
      - run: npm ci

      # CI gate before any publish ([SWR-REL-WORKFLOW]). The full test suite already
      # gated this exact tree at PR time (branch protection requires the CI check);
      # lint + build keep the release deterministic without re-running browser E2E.
      - name: Lint gate
        run: make lint

      - name: Build
        run: make build

      - run: npm run -w typediagram build

      # [SWR-GATE-CI] [SWR-GATE-VERIFY-BINARIES] manifest + version contract gates.
      - name: Shipwright acceptance gates
        run: |
          npx --yes @nimblesite/shipwright-validate-manifest@0.9.0 --schema schemas/shipwright.schema.json shipwright.json
          V="${{ steps.derive.outputs.version }}"
          OUT="$(node packages/cli/dist/bin.js --version)"
          test "$OUT" = "typediagram $V"
          node packages/cli/dist/bin.js --version --json

      # Idempotent publishes: a re-run of a partially-failed release is safe ([SWR-REL-WORKFLOW]).
      - name: Publish typediagram-core
        run: |
          V="${{ steps.derive.outputs.version }}"
          if [ -n "$(npm view "typediagram-core@$V" version 2>/dev/null || true)" ]; then
            echo "typediagram-core@$V already published — skipping"
          else
            npm publish --workspace=packages/typediagram --tag ${{ steps.derive.outputs.npm_tag }} --provenance --access public
          fi

      - name: Publish typediagram CLI
        run: |
          V="${{ steps.derive.outputs.version }}"
          if [ -n "$(npm view "typediagram@$V" version 2>/dev/null || true)" ]; then
            echo "typediagram@$V already published — skipping"
          else
            npm publish --workspace=packages/cli --tag ${{ steps.derive.outputs.npm_tag }} --provenance --access public
          fi

      - name: Package VSIX
        run: npm run -w typediagram-vscode package

      # [SWR-VSIX-VERIFY] Pure-JS extension (no native binaries — fat VSIX per
      # [SWR-VSIX-FAT]): the bundle must contain the esbuild output and no sources,
      # tests, or unbundled node_modules.
      - name: Verify VSIX contents
        run: |
          VSIX="$(ls typediagram-*.vsix | head -1)"
          unzip -l "$VSIX" | grep -q "extension/dist/"
          if unzip -l "$VSIX" | grep -E "extension/(src|test|node_modules)/"; then
            echo "VSIX contains forbidden paths" >&2
            exit 1
          fi

      - name: Pack npm tarballs for release assets
        run: |
          npm pack --workspace=packages/typediagram --pack-destination=.
          npm pack --workspace=packages/cli --pack-destination=.

      # [SWR-SEC-CHECKSUM] One SHA256SUMS over all release assets.
      - name: Generate SHA256SUMS
        run: |
          ASSETS=$(ls typediagram-*.vsix typediagram-core-*.tgz typediagram-*.tgz 2>/dev/null | sort -u)
          # shellcheck disable=SC2086  # word-splitting is intentional here
          sha256sum $ASSETS > SHA256SUMS
          cat SHA256SUMS

      # Hardening steps below are continue-on-error for the first release so a new
      # attestation/signing failure can never block publishing. Flip them to blocking
      # once one release has proven the infra ([SWR-SEC-CHECKSUM] [SWR-SEC-PROVENANCE] [SWR-SEC-SBOM]).
      - name: Install cosign
        continue-on-error: true
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign SHA256SUMS (cosign keyless)
        continue-on-error: true
        run: cosign sign-blob --yes --bundle SHA256SUMS.sigstore.json SHA256SUMS

      - name: Attest build provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            typediagram-*.vsix
            typediagram-*.tgz

      - name: Generate SBOM (CycloneDX)
        continue-on-error: true
        run: npx --yes @cyclonedx/cyclonedx-npm@4.2.1 --omit dev --output-file sbom.cdx.json

      - name: Create GitHub Release and attach assets
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
          # Collect unique assets — `typediagram-*.tgz` overlaps `typediagram-core-*.tgz`,
          # so globbing both would make `gh release upload` race against itself with
          # --clobber and return HTTP 404. Dedupe by path via `sort -u`.
          ASSETS=$(ls typediagram-*.vsix typediagram-core-*.tgz typediagram-*.tgz SHA256SUMS SHA256SUMS.sigstore.json sbom.cdx.json 2>/dev/null | sort -u)
          if [ -z "$ASSETS" ]; then
            echo "No release assets found to upload" >&2
            exit 1
          fi
          echo "Uploading:"
          echo "$ASSETS"
          # shellcheck disable=SC2086  # word-splitting is intentional here
          gh release upload "$TAG" $ASSETS --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      # Hand the packaged VSIX to publish-marketplace. That job runs in the
      # `release` environment so its OIDC subject matches the Entra trust; it
      # can't share this job's environment, so the VSIX crosses as an artifact.
      - name: Upload VSIX artifact for Marketplace publish
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vsix
          path: typediagram-*.vsix
          if-no-files-found: error
          retention-days: 1

  # [SWR-VSIX-PUBLISH] Marketplace publish via Microsoft Entra OIDC — NO stored PAT.
  # Runs in the `release` environment so the GitHub OIDC subject is
  # `repo:Nimblesite/typeDiagram:environment:release`, which the shared Entra app's
  # wildcard federated credential (`repo:Nimblesite/*:environment:release`) trusts.
  # Runbook: Nimblesite/NimblesiteDeployment docs/vscode-marketplace-oidc.md (Part D).
  # There is intentionally NO silent skip — a missing identity or a publish failure
  # fails this job and turns the release red.
  publish-marketplace:
    name: Publish VSIX to VS Code Marketplace
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release
    permissions:
      contents: read
      id-token: write # request the GitHub OIDC token for azure/login
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vsix
          path: vsix

      # Exchange the GitHub OIDC token for an Entra session — no client secret, no PAT.
      # The publisher app holds no Azure subscription role (its only authorization is
      # Marketplace publisher membership) → allow-no-subscriptions.
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Publish VSIX (Entra OIDC, no PAT)
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VSIX="$(ls vsix/typediagram-*.vsix 2>/dev/null | head -1)"
          if [ -z "$VSIX" ] || [ ! -f "$VSIX" ]; then
            echo "::error::No VSIX artifact found to publish" >&2
            exit 1
          fi
          # Pre-release only for pre-release tags (v1.2.3-beta); a clean vX.Y.Z is stable.
          flag=""
          [[ "$GITHUB_REF_NAME" == *-* ]] && flag="--pre-release"
          # Mint a Marketplace-scoped token from the OIDC session. 499b84ac-… is Azure
          # DevOps' immutable first-party app id vsce authenticates against. We mint and
          # pass it ourselves rather than `vsce publish --azure-credential` (buggy:
          # microsoft/vscode-vsce#1023).
          VSCE_PAT="$(az account get-access-token \
            --resource 499b84ac-1321-427f-aa17-267ca6975798 \
            --query accessToken -o tsv)"
          echo "::add-mask::$VSCE_PAT"
          export VSCE_PAT
          # Pinned vsce (a floating npx would run latest inside a token-holding job).
          # --skip-duplicate keeps re-runs idempotent; any real failure fails loudly.
          npx --yes @vscode/vsce@3.9.2 publish ${flag} --skip-duplicate --packagePath "$VSIX"
