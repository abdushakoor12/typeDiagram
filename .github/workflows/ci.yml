# agent-pmo:02a321a
name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Run every step under bash with strict fail-fast flags.
defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: vitest + bundle-size + eslint across 4 workspaces exceeds 10 min on cold npm cache.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Playwright needs chromium for the packages/web E2E tests. --with-deps
      # ensures required OS libraries are present on ubuntu-latest.
      - name: Install Playwright browsers
        run: npx --workspace=@typediagram/web playwright install chromium --with-deps

      # Single `make ci` step runs the full pipeline (fmt-check -> lint -> test -> build -> bundle-size).
      - name: CI (make ci)
        run: make ci

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            packages/*/coverage/
          retention-days: 7
